<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruth ❤️ Murilo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Ruth ❤️ Murilo</h1>

        <p>
            Uma pequena história sobre duas pessoas
            que decidiram caminhar juntas.
        </p>

        <button id="startBtn">
            Começar
        </button>
    </div>

</section>

<section id="contador" class="contador">

    <h2>Desde que demos a primeira bitoca ❤️</h2>

    <div id="tempo"></div>

</section>

<section class="timeline">

    <h2>Um Pouquinho da Nossa História ❤️</h2>

    <div class="timeline-container">

        <div class="evento">
            <h3>Junho de 2025</h3>
            <img src="assets/timeline/foto1.jpg">
            <p>
                Conquistando a pretinha
            </p>
        </div>

        <div class="evento">
            <h3>Agosto de 2025</h3>
            <img src="assets/timeline/foto2.jpg">
            <p>
                Uma que você gosta
            </p>
        </div>

        <div class="evento">
            <h3>Dezembro de 2025</h3>
            <img src="assets/timeline/foto3.jpg">
            <p>
                Família ❤️
            </p>
        </div>

        <div class="evento">
            <h3>Abril de 2026</h3>
            <img src="assets/timeline/foto4.jpg">
            <p>
                Café com momo
            </p>
        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
